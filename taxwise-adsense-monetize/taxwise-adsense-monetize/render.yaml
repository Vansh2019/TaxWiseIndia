services:
  - type: web
    name: taxwise-india
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: SITE_URL
        sync: false
      - key: ADMIN_SECRET
        sync: false
